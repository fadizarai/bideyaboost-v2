services:

  db:
    image: postgres:15-alpine
    container_name: bideya_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bideya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bideyapassword}
      POSTGRES_DB: ${POSTGRES_DB:-bideyadb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bideya} -d ${POSTGRES_DB:-bideyadb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bideya_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: bideya_backend
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bideya}:${POSTGRES_PASSWORD:-bideyapassword}@db:5432/${POSTGRES_DB:-bideyadb}?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - AI_SERVICE_URL=http://ai:8000
      - AI_RECOMMEND_PATH=/recommend
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend/docker-entrypoint.sh:/app/docker-entrypoint.sh:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ai:
    build:
      context: ./ai-engine
    container_name: bideya_ai
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-bideya}:${POSTGRES_PASSWORD:-bideyapassword}@db:5432/${POSTGRES_DB:-bideyadb}
      - MODEL_PATH=/app/models
    ports:
      - "8000:8000"
    volumes:
      - ai_models:/app/models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        BACKEND_INTERNAL_URL: http://backend:3001/api
    container_name: bideya_frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api
      - BACKEND_INTERNAL_URL=http://backend:3001/api
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: bideya_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai

volumes:
  postgres_data:
  redis_data:
  ai_models:
